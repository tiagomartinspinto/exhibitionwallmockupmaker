        delete state.view3d.pitch;
        delete state.view3d.roll;
      }
      save();
      render();
    }

    function rotate3d(axis, amount) {
      state.view3d.rotX = state.view3d.rotX ?? state.view3d.pitch ?? -10;
      state.view3d.rotY = state.view3d.rotY ?? state.view3d.yaw ?? 24;
      state.view3d.rotZ = state.view3d.rotZ ?? state.view3d.roll ?? 0;
      if (axis === "x") state.view3d.rotX = normalizeDegrees(state.view3d.rotX + amount);
      if (axis === "y") state.view3d.rotY = normalizeDegrees(state.view3d.rotY + amount);
      if (axis === "z") state.view3d.rotZ = normalizeDegrees(state.view3d.rotZ + amount);
      save();
      render();
    }

    function selectionBounds(items) {
      return items.reduce((bounds, item) => ({
        left: Math.min(bounds.left, item.x),
        right: Math.max(bounds.right, item.x + item.width),
        bottom: Math.min(bounds.bottom, item.y),
        top: Math.max(bounds.top, item.y + item.height)
      }), { left: Infinity, right: -Infinity, bottom: Infinity, top: -Infinity });
    }

    function alignSelection(mode) {
      const items = selectedItems();
      if (items.length < 2) return;
      const bounds = selectionBounds(items);
      const centerX = (bounds.left + bounds.right) / 2;
      const centerY = (bounds.bottom + bounds.top) / 2;

      items.forEach(item => {
        if (mode === "left") item.x = bounds.left;
        if (mode === "center") item.x = Math.round(centerX - item.width / 2);
        if (mode === "right") item.x = bounds.right - item.width;
        if (mode === "bottom") item.y = bounds.bottom;
        if (mode === "middle") item.y = Math.round(centerY - item.height / 2);
        if (mode === "top") item.y = bounds.top - item.height;
        clampItemToWall(item);
      });
      save();
      render();
    }

    function distributeSelection(axis) {
      const items = selectedItems();
      if (items.length < 3) return;
      const sorted = [...items].sort((a, b) => axis === "h" ? a.x - b.x : a.y - b.y);
      const first = sorted[0];
      const last = sorted[sorted.length - 1];
      const start = axis === "h" ? first.x + first.width / 2 : first.y + first.height / 2;
      const end = axis === "h" ? last.x + last.width / 2 : last.y + last.height / 2;
      const gap = (end - start) / (sorted.length - 1);
      sorted.forEach((item, index) => {
        const center = Math.round(start + gap * index);
        if (axis === "h") item.x = center - item.width / 2;
        if (axis === "v") item.y = center - item.height / 2;
        clampItemToWall(item);
      });
      save();
      render();
    }

    function itemAtPoint(point) {
      const width = els.canvas.width / (window.devicePixelRatio || 1);
      const height = els.canvas.height / (window.devicePixelRatio || 1);
      const geom = elevationGeometry(width, height);
      for (let i = state.items.length - 1; i >= 0; i -= 1) {
        if (pointInItem(point, normalizeItem(state.items[i]), geom)) {
          return { item: state.items[i], geom };
        }
      }
      return { item: null, geom };
    }

    function wallAtSpacePoint(point) {
      const width = els.canvas.width / (window.devicePixelRatio || 1);
      const height = els.canvas.height / (window.devicePixelRatio || 1);
      const geom = spaceGeometry(width, height);
      for (let i = state.walls.length - 1; i >= 0; i -= 1) {
        const wall = state.walls[i];
        const ends = wallSpaceEndpoints(wall);
        const a = spacePoint(geom, ends.a.x, ends.a.y);
        const b = spacePoint(geom, ends.b.x, ends.b.y);
        const lengthSq = (b.x - a.x) ** 2 + (b.y - a.y) ** 2;
        const t = lengthSq ? Math.max(0, Math.min(1, ((point.x - a.x) * (b.x - a.x) + (point.y - a.y) * (b.y - a.y)) / lengthSq)) : 0;
        const closest = { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
        if (Math.hypot(point.x - closest.x, point.y - closest.y) <= 14) return { wall, geom };
      }
      return { wall: null, geom };
    }

    function startDrag(event) {
      if (state.view === "space2d") {
        const point = pointerPosition(event);
        const { wall, geom } = wallAtSpacePoint(point);
        if (!wall) return;
        syncActiveWallRecord();
        state.activeWallId = wall.id;
        loadActiveWall();
        syncInputsFromWall();
        state.drag = {
          type: "spaceWall",
          id: wall.id,
          offsetX: (point.x - geom.x) / geom.scale - wall.placement.x,
          offsetY: (geom.y + geom.h - point.y) / geom.scale - wall.placement.y
        };
        if (typeof els.canvas.setPointerCapture === "function") {
          els.canvas.setPointerCapture(event.pointerId);
        }
        render();
        return;
      }
      if (state.view === "perspective" || state.view === "space3d") {
        state.rotateDrag = {
          startX: event.clientX,
          startY: event.clientY,
          startRotY: state.view3d.rotY ?? state.view3d.yaw ?? 24,
          startRotX: state.view3d.rotX ?? state.view3d.pitch ?? -10,
          startRotZ: state.view3d.rotZ ?? state.view3d.roll ?? 0
        };
        if (typeof els.canvas.setPointerCapture === "function") {
          els.canvas.setPointerCapture(event.pointerId);
        }
        return;
      }
      if (state.view !== "elevation") return;
      const point = pointerPosition(event);
      const canvasWidth = els.canvas.width / (window.devicePixelRatio || 1);
      const canvasHeight = els.canvas.height / (window.devicePixelRatio || 1);
      const handleGeom = elevationGeometry(canvasWidth, canvasHeight);
      const resizeItem = resizeHandleAt(point, handleGeom);
      if (resizeItem) {
        state.resizeDrag = {
          id: resizeItem.id,
          startX: point.x,
          startY: point.y,
          width: resizeItem.width,
          height: resizeItem.height
        };
        if (typeof els.canvas.setPointerCapture === "function") {
          els.canvas.setPointerCapture(event.pointerId);
        }
        return;
      }
      const { item, geom } = itemAtPoint(point);
      if (!item) {
        if (!event.shiftKey) setSelection([]);
        render();
        return;
      }
      if (event.shiftKey) {
        toggleSelection(item.id);
      } else if (!isSelected(item.id)) {
        setSelection([item.id]);
      }
      const draggedItems = selectedItems();
      state.drag = {
        id: item.id,
        offsetX: (point.x - mmX(geom, item.x)) / geom.scale,
        offsetY: (mmY(geom, item.y + item.height) + item.height * geom.scale - point.y) / geom.scale,
        starts: draggedItems.map(candidate => ({ id: candidate.id, x: candidate.x, y: candidate.y })),
        bounds: selectionBounds(draggedItems),
        originX: item.x,
        originY: item.y
      };
      if (typeof els.canvas.setPointerCapture === "function") {
        els.canvas.setPointerCapture(event.pointerId);
      }
      render();
    }

    function moveDrag(event) {
      if (state.rotateDrag && (state.view === "perspective" || state.view === "space3d")) {
        if (event.shiftKey) {
          state.view3d.rotZ = normalizeDegrees(state.rotateDrag.startRotZ + (event.clientX - state.rotateDrag.startX) * 0.32);
        } else {
          state.view3d.rotY = normalizeDegrees(state.rotateDrag.startRotY + (event.clientX - state.rotateDrag.startX) * 0.28);
          state.view3d.rotX = normalizeDegrees(state.rotateDrag.startRotX - (event.clientY - state.rotateDrag.startY) * 0.22);
        }
        render();
        return;
      }
      if (state.resizeDrag && state.view === "elevation") {
        const item = state.items.find(candidate => candidate.id === state.resizeDrag.id);
        if (!item) return;
        const width = els.canvas.width / (window.devicePixelRatio || 1);
        const height = els.canvas.height / (window.devicePixelRatio || 1);
        const geom = elevationGeometry(width, height);
        const point = pointerPosition(event);
        const deltaW = (point.x - state.resizeDrag.startX) / geom.scale;
        const deltaH = -(point.y - state.resizeDrag.startY) / geom.scale;
        let nextW = Math.max(50, Math.round(state.resizeDrag.width + deltaW));
        let nextH = Math.max(50, Math.round(state.resizeDrag.height + deltaH));
        const targets = snapTargets([item.id]);
        const snappedRight = snapValue(item.x + nextW, targets.vertical);
        const snappedTop = snapValue(item.y + nextH, targets.horizontal);
        state.snapLines = [];
        if (snappedRight.line) {
          nextW = Math.round(snappedRight.value - item.x);
          state.snapLines.push(snappedRight.line);
        }
        if (snappedTop.line) {
          nextH = Math.round(snappedTop.value - item.y);
          state.snapLines.push(snappedTop.line);
        }
        item.width = Math.max(50, Math.min(state.wall.width - item.x, nextW));
        item.height = Math.max(50, Math.min(state.wall.height - item.y, nextH));
        render();
        return;
      }
      if (state.drag && state.drag.type === "spaceWall") {
        const wall = state.walls.find(candidate => candidate.id === state.drag.id);
        if (!wall) return;
        const width = els.canvas.width / (window.devicePixelRatio || 1);
        const height = els.canvas.height / (window.devicePixelRatio || 1);
        const geom = spaceGeometry(width, height);
        const point = pointerPosition(event);
        wall.placement.x = Math.round((point.x - geom.x) / geom.scale - state.drag.offsetX);
        wall.placement.y = Math.round((geom.y + geom.h - point.y) / geom.scale - state.drag.offsetY);
        wall.placement.x = clamp(wall.placement.x, 0, state.space.width);
        wall.placement.y = clamp(wall.placement.y, 0, state.space.depth);
        if (wall.id === state.activeWallId) syncInputsFromWall();
        render();
        return;
      }
      if (!state.drag || state.view !== "elevation") return;
      if (state.view !== "elevation") return;
      const item = state.items.find(candidate => candidate.id === state.drag.id);
      if (!item) return;
      const width = els.canvas.width / (window.devicePixelRatio || 1);
      const height = els.canvas.height / (window.devicePixelRatio || 1);
      const geom = elevationGeometry(width, height);
      const point = pointerPosition(event);
      const nextX = Math.round((point.x - geom.x) / geom.scale - state.drag.offsetX);
      const nextY = Math.round((geom.y + geom.h - point.y) / geom.scale - state.drag.offsetY);
      let deltaX = nextX - state.drag.originX;
      let deltaY = nextY - state.drag.originY;
      const dragged = state.drag.starts || [{ id: item.id, x: item.x, y: item.y }];
      if (state.drag.bounds) {
        deltaX = clamp(deltaX, -state.drag.bounds.left, state.wall.width - state.drag.bounds.right);
        deltaY = clamp(deltaY, -state.drag.bounds.bottom, state.wall.height - state.drag.bounds.top);
        const targets = snapTargets(dragged.map(start => start.id));
        const leftSnap = snapValue(state.drag.bounds.left + deltaX, targets.vertical);
        const rightSnap = snapValue(state.drag.bounds.right + deltaX, targets.vertical);
        const bottomSnap = snapValue(state.drag.bounds.bottom + deltaY, targets.horizontal);
        const topSnap = snapValue(state.drag.bounds.top + deltaY, targets.horizontal);
        state.snapLines = [];
        const bestX = leftSnap.line && (!rightSnap.line || leftSnap.distance <= rightSnap.distance) ? leftSnap : rightSnap;
        const bestY = bottomSnap.line && (!topSnap.line || bottomSnap.distance <= topSnap.distance) ? bottomSnap : topSnap;
        if (bestX.line) {
          deltaX += bestX.value - (bestX === leftSnap ? state.drag.bounds.left + deltaX : state.drag.bounds.right + deltaX);
          state.snapLines.push(bestX.line);
        }
        if (bestY.line) {
          deltaY += bestY.value - (bestY === bottomSnap ? state.drag.bounds.bottom + deltaY : state.drag.bounds.top + deltaY);
          state.snapLines.push(bestY.line);
        }
      }
      dragged.forEach(start => {
        const candidate = state.items.find(entry => entry.id === start.id);
        if (!candidate) return;
        candidate.x = Math.round(start.x + deltaX);
        candidate.y = Math.round(start.y + deltaY);
      });
      render();
    }

    function stopDrag(event) {
      if (state.rotateDrag) {
        state.rotateDrag = null;
        if (event.pointerId !== undefined && typeof els.canvas.hasPointerCapture === "function" && els.canvas.hasPointerCapture(event.pointerId)) {
          els.canvas.releasePointerCapture(event.pointerId);
        }
        save();
        render();
        return;
      }
      if (state.resizeDrag) {
        state.resizeDrag = null;
        state.snapLines = [];
        if (event.pointerId !== undefined && typeof els.canvas.hasPointerCapture === "function" && els.canvas.hasPointerCapture(event.pointerId)) {
          els.canvas.releasePointerCapture(event.pointerId);
        }
        save();
        render();
        return;
      }
      if (!state.drag) return;
      state.drag = null;
      state.snapLines = [];
      if (event.pointerId !== undefined && typeof els.canvas.hasPointerCapture === "function" && els.canvas.hasPointerCapture(event.pointerId)) {
        els.canvas.releasePointerCapture(event.pointerId);
      }
      save();
      render();
    }

    function save() {
      syncActiveWallRecord();
      localStorage.setItem("wall-mockup-maker", JSON.stringify(state));
    }

    function load() {
      const saved = localStorage.getItem("wall-mockup-maker");
      if (!saved) return;
      try {
        const parsed = JSON.parse(saved);
        state.view = parsed.view || state.view;
        state.view2d = { ...state.view2d, ...parsed.view2d };
        state.view3d = { ...state.view3d, ...parsed.view3d };
        state.view3d.rotX = state.view3d.rotX ?? state.view3d.pitch ?? -10;
        state.view3d.rotY = state.view3d.rotY ?? state.view3d.yaw ?? 24;
        state.view3d.rotZ = state.view3d.rotZ ?? state.view3d.roll ?? 0;
        delete state.view3d.yaw;
        delete state.view3d.pitch;
        delete state.view3d.roll;
        state.space = { ...state.space, ...parsed.space };
        if (state.space.floorColor === "#1d2a23") state.space.floorColor = "#101113";
        if (state.space.surroundColor === "#202821") state.space.surroundColor = "#070708";
        state.project = { ...state.project, ...parsed.project };
        state.activeWallId = parsed.activeWallId || state.activeWallId;
        state.walls = Array.isArray(parsed.walls) ? parsed.walls.map((wall, index) => ({
          id: wall.id || uid(),
          name: wall.name || `Wall ${index + 1}`,
          wall: { width: 6000, height: 3000, depth: 120, color: "#f5f4ea", ...wall.wall },
          items: Array.isArray(wall.items) ? wall.items.map(normalizeItem) : [],
          placement: { x: 1000, y: 1000, rotation: 0, ...wall.placement }
        })) : state.walls;
        if (!state.walls.length) {
          state.wall = { ...state.wall, ...parsed.wall };
          state.items = Array.isArray(parsed.items) ? parsed.items.map(normalizeItem) : state.items;
        }
        ensureWalls();
        setSelection([]);
        state.drag = null;
        state.rotateDrag = null;
        state.resizeDrag = null;
        state.snapLines = [];
      } catch {
        localStorage.removeItem("wall-mockup-maker");
      }
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function drawSchedule(x, y, width) {
      const rowH = 34;
      const columns = [
        { label: "ID", width: 90 },
        { label: "Name", width: 520 },
        { label: "Type", width: 260 },
        { label: "Size", width: 260 },
        { label: "Position", width: 280 },
        { label: "Notes", width: width - 1410 }
      ];
      let colX = x;
      drawText("Object schedule", x, y - 36, { align: "left", color: "#161616", size: 25, halo: null });
      activeCtx.fillStyle = "#edf2ec";
      activeCtx.fillRect(x, y, width, rowH);
      columns.forEach(column => {
        drawText(column.label, colX + 10, y + rowH / 2, { align: "left", color: "#161616", size: 16, halo: null });
        colX += column.width;
      });
      state.items.slice(0, 12).forEach((rawItem, index) => {
        const item = normalizeItem(rawItem);
        const rowY = y + rowH * (index + 1);
        activeCtx.fillStyle = index % 2 ? "#ffffff" : "#f8faf6";
        activeCtx.fillRect(x, rowY, width, rowH);
        activeCtx.strokeStyle = "#d6ddd4";
        activeCtx.strokeRect(x, rowY, width, rowH);
        const values = [
          itemCode(item),
          item.name,
          item.type,
          `${item.width} x ${item.height}`,
          `x ${Math.round(item.x)}, y ${Math.round(item.y)}`,
          item.text || (item.illuminated ? "Illuminated" : "")
        ];
        colX = x;
        columns.forEach((column, columnIndex) => {
          drawText(values[columnIndex], colX + 10, rowY + rowH / 2, {
            align: "left",
            color: "#26312b",
            size: 15,
            weight: 600,
            halo: null,
            maxWidth: column.width - 18
          });
          colX += column.width;
        });
      });
    }

    function createA3Canvas() {
      const previousCanvas = activeCanvas;
      const previousCtx = activeCtx;
      const previousView = state.view;
      const previousZoom2d = state.view2d.zoom;
      const previousZoom3d = state.view3d.zoom;
      const a3 = {
        width: 4961,
        height: 3508,
        margin: 220,
        header: 250
      };
      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = a3.width;
      exportCanvas.height = a3.height;
      activeCanvas = exportCanvas;
      activeCtx = exportCanvas.getContext("2d");
      activeCtx.setTransform(1, 0, 0, 1, 0, 0);
      activeCtx.fillStyle = "#ffffff";
      activeCtx.fillRect(0, 0, a3.width, a3.height);

      const titles = {
        elevation: "2D measured wall layout",
        perspective: "3D wall preview",
        space2d: "2D exhibition space plan",
        space3d: "3D exhibition space preview"
      };
      const title = titles[state.view] || "Exhibition preview";
      drawText("Exhibition Wall Mockup Maker", a3.margin, 86, { align: "left", baseline: "middle", color: "#161616", size: 42, halo: null });
      drawText(`by Tiago | ${title}`, a3.margin, 142, { align: "left", baseline: "middle", color: "#5d655f", size: 25, weight: 600, halo: null });
      drawText(`${state.project.title || "Untitled exhibition"}${state.project.artist ? ` | ${state.project.artist}` : ""}${state.project.museum ? ` | ${state.project.museum}` : ""}`, a3.margin, 190, { align: "left", baseline: "middle", color: "#5d655f", size: 23, weight: 600, halo: null });
      drawText(`${state.project.wallId || "Wall"} | ${state.project.revision || "Rev A"} | Wall ${state.wall.width} x ${state.wall.height} mm | depth ${state.wall.depth} mm | A3 300 dpi`, a3.margin, 232, { align: "left", baseline: "middle", color: "#5d655f", size: 21, weight: 600, halo: null });
      if (state.project.notes) drawText(state.project.notes, a3.width - a3.margin, 142, { align: "right", baseline: "middle", color: "#5d655f", size: 18, weight: 600, halo: null, maxWidth: 1250 });
      drawLine(a3.margin, 242, a3.width - a3.margin, 242, "#c8cfc8");

      const drawingX = a3.margin;
      const drawingY = a3.header + a3.margin / 2;
      const drawingW = a3.width - a3.margin * 2;
      const scheduleH = 520;
      const drawingH = a3.height - drawingY - a3.margin - scheduleH;
      const drawingCanvas = document.createElement("canvas");
      drawingCanvas.width = drawingW;
      drawingCanvas.height = drawingH;

      activeCanvas = drawingCanvas;
      activeCtx = drawingCanvas.getContext("2d");
      activeCtx.setTransform(1, 0, 0, 1, 0, 0);
      if (previousView === "elevation") {
        state.view2d.zoom = 1;
        drawElevation();
      } else if (previousView === "perspective") {
        state.view3d.zoom = Math.max(1.15, previousZoom3d);
        drawPerspective();
      } else if (previousView === "space2d") {
        state.view2d.zoom = 1;
        drawSpace2D();
      } else {
        state.view3d.zoom = Math.max(1.05, previousZoom3d);
        drawSpace3D();
      }

      activeCanvas = exportCanvas;
      activeCtx = exportCanvas.getContext("2d");
      activeCtx.drawImage(drawingCanvas, drawingX, drawingY);
      drawSchedule(drawingX, drawingY + drawingH + 110, drawingW);

      state.view = previousView;
      state.view2d.zoom = previousZoom2d;
      state.view3d.zoom = previousZoom3d;
      activeCanvas = previousCanvas;
      activeCtx = previousCtx;
      activeCtx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
      render();
      return exportCanvas;
    }

    function exportA3Png() {
      const previousView = state.view;
      const exportCanvas = createA3Canvas();
      const link = document.createElement("a");
      link.download = `wall-mockup-a3-${previousView}.png`;
      link.href = exportCanvas.toDataURL("image/png");
      link.click();
    }

    function printA3Pdf() {
      const dataUrl = createA3Canvas().toDataURL("image/png");
      const printWindow = window.open("", "_blank");
      if (!printWindow) return;
      printWindow.document.write(`
        <!doctype html>
        <html>
          <head>
            <title>${escapeHtml(state.project.title || "Exhibition Wall Mockup Maker")}</title>
            <style>
              @page { size: A3 landscape; margin: 0; }
              html, body { margin: 0; background: #fff; }
              img { width: 100vw; height: 100vh; object-fit: contain; display: block; }
            </style>
          </head>
          <body>
            <img src="${dataUrl}" onload="window.focus(); window.print();">
          </body>
        </html>
      `);
      printWindow.document.close();
    }

    document.querySelectorAll("#wallWidth,#wallHeight,#wallDepth,#wallColor,#wallSpaceX,#wallSpaceY,#wallSpaceRotation").forEach(input => {
      input.addEventListener("input", syncWallFromInputs);
    });

    document.querySelectorAll("#spaceWidth,#spaceDepth,#spaceFloorColor,#spaceSurroundColor,#spaceCinematicLight").forEach(input => {
      input.addEventListener("input", syncSpaceFromInputs);
      input.addEventListener("change", syncSpaceFromInputs);
    });

    els.wallTabs.addEventListener("click", event => {
      const button = event.target.closest("[data-wall-tab]");
      if (button) switchWall(button.dataset.wallTab);
    });

    els.addWall.addEventListener("click", addWall);
    els.duplicateWall.addEventListener("click", duplicateWall);
    els.deleteWall.addEventListener("click", deleteWall);

    document.querySelectorAll("#projectTitle,#projectArtist,#projectMuseum,#projectWallId,#projectRevision,#projectNotes").forEach(input => {
      input.addEventListener("input", syncProjectFromInputs);
    });

    els.itemImage.addEventListener("change", event => {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        els.itemImage.dataset.image = "";
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        els.itemImage.dataset.image = String(reader.result || "");
      };
      reader.readAsDataURL(file);
    });

    document.querySelector("#addItem").addEventListener("click", () => {
      addItem({
        name: els.itemName.value,
        type: els.itemType.value,
        shape: els.itemShape.value,
        color: els.itemColor.value,
        illuminated: els.itemIlluminated.checked || els.itemType.value === "illumination",
        text: els.itemText.value,
        image: els.itemImage.dataset.image || "",
        x: els.itemX.value,
        y: els.itemY.value,
        width: els.itemW.value,
        height: els.itemH.value
      });
      els.itemImage.value = "";
      els.itemImage.dataset.image = "";
    });

    document.querySelector("#clearItems").addEventListener("click", () => {
      state.items = [];
      setSelection([]);
      save();
      render();
    });

    document.querySelector("#sample").addEventListener("click", () => {
      state.wall = { width: 6000, height: 3000, depth: 120, color: "#f5f4ea" };
      state.items = [
        { id: uid(), name: "Artwork", type: "artwork", shape: "rect", text: "", illuminated: false, x: 900, y: 900, width: 1200, height: 800, color: "#2f6f9f" },
        { id: uid(), name: "Wall label", type: "label", shape: "rect", text: "Intro text", illuminated: false, x: 2400, y: 1700, width: 900, height: 220, color: "#eff6ff" },
        { id: uid(), name: "Round light", type: "illumination", shape: "circle", text: "", illuminated: true, x: 3300, y: 2050, width: 420, height: 420, color: "#f7d154" },
        { id: uid(), name: "Screen", type: "screen", shape: "rect", text: "", illuminated: false, x: 3600, y: 650, width: 1800, height: 900, color: "#151515" }
      ];
      setSelection([]);
      syncInputsFromWall();
      save();
      render();
    });

    els.itemList.addEventListener("click", event => {
      const button = event.target.closest("[data-remove]");
      if (button) {
        state.items = state.items.filter(item => item.id !== button.dataset.remove);
        setSelection(selectedIds().filter(id => id !== button.dataset.remove));
        save();
        render();
        return;
      }
      const row = event.target.closest("[data-select]");
      if (row) {
        if (event.shiftKey) {
          toggleSelection(row.dataset.select);
        } else {
          setSelection([row.dataset.select]);
        }
        render();
      }
    });

    els.itemType.addEventListener("change", () => {
      els.itemColor.value = colorForType(els.itemType.value);
      if (els.itemType.value === "illumination") {
        els.itemShape.value = "circle";
        els.itemIlluminated.checked = true;
      }
    });

    document.querySelectorAll(".tab[data-view]").forEach(button => {
      button.addEventListener("click", () => {
        state.view = button.dataset.view;
        document.querySelectorAll(".tab[data-view]").forEach(tab => tab.classList.toggle("active", tab === button));
        save();
        render();
      });
    });

    els.zoomOut.addEventListener("click", () => zoomView(-0.15));
    els.zoomIn.addEventListener("click", () => zoomView(0.15));
    els.resetView.addEventListener("click", resetView);
    els.rotateXDown.addEventListener("click", () => rotate3d("x", -10));
    els.rotateXUp.addEventListener("click", () => rotate3d("x", 10));
    els.rotateYLeft.addEventListener("click", () => rotate3d("y", -12));
    els.rotateYRight.addEventListener("click", () => rotate3d("y", 12));
    els.rotateZLeft.addEventListener("click", () => rotate3d("z", -10));
    els.rotateZRight.addEventListener("click", () => rotate3d("z", 10));
    els.alignLeft.addEventListener("click", () => alignSelection("left"));
    els.alignCenter.addEventListener("click", () => alignSelection("center"));
    els.alignRight.addEventListener("click", () => alignSelection("right"));
    els.alignTop.addEventListener("click", () => alignSelection("top"));
    els.alignMiddle.addEventListener("click", () => alignSelection("middle"));
    els.alignBottom.addEventListener("click", () => alignSelection("bottom"));
    els.distributeH.addEventListener("click", () => distributeSelection("h"));
    els.distributeV.addEventListener("click", () => distributeSelection("v"));

    document.querySelector("#exportPng").addEventListener("click", () => {
      exportA3Png();
    });

    els.printPdf.addEventListener("click", printA3Pdf);

    window.addEventListener("resize", resizeCanvas);
    els.canvas.addEventListener("pointerdown", startDrag);
    els.canvas.addEventListener("pointermove", moveDrag);
    els.canvas.addEventListener("pointerup", stopDrag);
    els.canvas.addEventListener("pointercancel", stopDrag);
    els.canvas.addEventListener("wheel", event => {
      event.preventDefault();
      zoomView(event.deltaY < 0 ? 0.12 : -0.12);
    }, { passive: false });

    load();
    ensureWalls();
    syncInputsFromWall();
    syncInputsFromSpace();
    syncInputsFromProject();
    document.querySelectorAll(".tab[data-view]").forEach(tab => tab.classList.toggle("active", tab.dataset.view === state.view));
    resizeCanvas();
  </script>
</body>
</html>
