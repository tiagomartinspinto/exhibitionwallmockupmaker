<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exhibition Wall Mockup Maker by @tiagomartinspinto</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-top">
          <h1>Exhibition Wall Mockup Maker</h1>
          <button id="themeToggle" class="theme-switch" type="button" role="switch" aria-checked="true" title="Toggle dark mode">
            <span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
            <span class="switch-label">Dark mode</span>
          </button>
        </div>
        <p>by <a href="https://github.com/tiagomartinspinto" target="_blank" rel="noreferrer">@tiagomartinspinto</a></p>
      </div>

      <section class="section">
        <label>Exhibition
          <input id="projectTitle" value="Untitled exhibition">
        </label>
      </section>

      <section class="section">
        <h2>Exhibition Room</h2>
        <div class="grid-2">
          <label>Space width mm
            <input id="spaceWidth" type="number" min="1000" step="100" value="12000">
          </label>
          <label>Space depth mm
            <input id="spaceDepth" type="number" min="1000" step="100" value="8000">
          </label>
        </div>
        <div class="grid-2">
          <label>Floor color
            <input id="spaceFloorColor" type="color" value="#101113">
          </label>
          <label>Surroundings
            <input id="spaceSurroundColor" type="color" value="#070708">
          </label>
        </div>
        <label class="checkbox-row">
          <input id="spaceCinematicLight" type="checkbox" checked>
          Cinematic light
        </label>
      </section>

      <section class="section">
        <h2>Wall</h2>
        <div id="wallTabs" class="button-row"></div>
        <div class="wall-actions">
          <button id="addWall" class="secondary icon-button" type="button" aria-label="Add wall" title="Add wall">Add</button>
          <button id="duplicateWall" class="secondary icon-button" type="button" aria-label="Duplicate wall" title="Duplicate wall">Copy</button>
          <button id="deleteWall" class="danger icon-button" type="button" aria-label="Delete wall" title="Delete wall">Delete</button>
          <button id="resetWall" class="secondary icon-button" type="button" aria-label="Reset wall" title="Reset wall">Reset</button>
        </div>
        <label>Wall name
          <input id="wallName" value="Wall A">
        </label>
        <div class="grid-2">
          <label>Width mm
            <input id="wallWidth" type="number" min="100" step="10" value="6000">
          </label>
          <label>Height mm
            <input id="wallHeight" type="number" min="100" step="10" value="3000">
          </label>
        </div>
        <div class="grid-2">
          <label>Depth mm
            <input id="wallDepth" type="number" min="40" step="10" value="120">
          </label>
          <label>Wall color
            <input id="wallColor" type="color" value="#f5f4ea">
          </label>
        </div>
        <p class="small">Space position is used only for Plan and Room views. You can also drag walls directly in Plan.</p>
        <div class="grid-2">
          <label>Wall X in space mm
            <input id="wallSpaceX" type="number" step="100" value="1000">
          </label>
          <label>Wall Y in space mm
            <input id="wallSpaceY" type="number" step="100" value="1000">
          </label>
        </div>
        <label>Wall rotation in space deg
          <input id="wallSpaceRotation" type="number" step="5" value="0">
        </label>
      </section>

      <section class="section">
        <h2>Object</h2>
        <label>Name
          <input id="itemName" value="Artwork">
        </label>
        <div class="grid-2">
          <label>Type
            <select id="itemType">
              <option value="title">Title text</option>
              <option value="text">Explanatory text</option>
              <option value="screen">Screen / moving image</option>
              <option value="graphic">Printed graphic / still visual</option>
              <option value="object">Physical object / prototype</option>
              <option value="support">Support / display hardware</option>
            </select>
          </label>
          <label>Shape
            <select id="itemShape">
              <option value="rect">rectangular</option>
              <option value="circle">circular</option>
            </select>
          </label>
        </div>
        <label>Color
          <input id="itemColor" type="color" value="#2f6f9f">
        </label>
        <label>Visible text
          <textarea id="itemText" spellcheck="true" placeholder="Optional words shown on the object"></textarea>
        </label>
        <label>Image
          <input id="itemImage" type="file" accept="image/*">
        </label>
        <div class="grid-2">
          <label>X from left mm
            <input id="itemX" type="number" step="10" value="900">
          </label>
          <label>Y from floor mm
            <input id="itemY" type="number" step="10" value="900">
          </label>
        </div>
        <div class="grid-2">
          <label>Width mm
            <input id="itemW" type="number" min="10" step="10" value="1200">
          </label>
          <label>Height mm
            <input id="itemH" type="number" min="10" step="10" value="800">
          </label>
        </div>
        <button id="addItem">Add to wall</button>
      </section>

      <section class="section">
        <h2>Objects</h2>
        <div id="itemList" class="item-list"></div>
        <div class="button-row">
          <button id="clearItems" class="danger">Clear</button>
          <button id="sample" class="secondary">Sample</button>
        </div>
        <p id="overlapSummary" class="small"></p>
      </section>
    </aside>

    <main class="main">
      <button id="sidebarToggle" class="stage-panel-toggle panel-toggle secondary" type="button" aria-pressed="false" aria-label="Hide left panel" title="Hide left panel"></button>
      <div class="toolbar">
        <strong id="projectName">Exhibition Wall Mockup Maker</strong>
        <div class="tabs" role="tablist" aria-label="View mode">
          <button class="tab active" data-view="elevation" title="2D measured wall">2D</button>
          <button class="tab" data-view="perspective" title="Wall 3D preview">3D</button>
          <button class="tab" data-view="space2d" title="Space floor plan">Floor plan</button>
          <button class="tab" data-view="space3d" title="Space 3D preview">3D Room</button>
          <button id="exportWallPdf" class="secondary" title="PDF from active wall 2D measured preview">Wall PDF</button>
          <button id="exportRoomPdf" class="secondary" title="PDF from exhibition space top view">Room PDF</button>
        </div>
        <div class="toolbar-tools">
          <div class="view-controls" aria-label="View controls">
            <span class="control-label">View</span>
            <button id="toolSelect" class="mini-button active" type="button" title="Select and move objects" aria-label="Select and move objects">
              <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 3v17l4.9-4.6 3 5.7 2.3-1.2-2.9-5.6 6.7-.9L4 3z"></path>
              </svg>
            </button>
            <button id="toolHand" class="mini-button" type="button" title="Pan the 2D preview (or hold Space)" aria-label="Pan the 2D preview">
              <svg class="tool-icon tool-icon-stroke" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 11V7a1 1 0 0 0-2 0v4"></path>
                <path d="M14 10V5a1 1 0 0 0-2 0v5"></path>
                <path d="M10 11V6.5a1 1 0 0 0-2 0V15"></path>
                <path d="M18 9a1 1 0 1 1 2 0v6.5A6.5 6.5 0 0 1 13.5 22h-1.2a5.8 5.8 0 0 1-4.3-1.9l-3-3.4A1.2 1.2 0 0 1 6.8 15l1.2 1.2"></path>
              </svg>
            </button>
            <button id="zoomOut" class="mini-button" type="button" title="Zoom out">-</button>
            <button id="zoomIn" class="mini-button" type="button" title="Zoom in">+</button>
            <button id="resetView" class="mini-button" type="button" title="Reset view">Reset</button>
            <button id="rotateXDown" class="mini-button" type="button" title="Rotate X backward">X-</button>
            <button id="rotateXUp" class="mini-button" type="button" title="Rotate X forward">X+</button>
            <button id="rotateYLeft" class="mini-button" type="button" title="Rotate Y left">Y-</button>
            <button id="rotateYRight" class="mini-button" type="button" title="Rotate Y right">Y+</button>
            <button id="rotateZLeft" class="mini-button" type="button" title="Rotate Z left">Z-</button>
            <button id="rotateZRight" class="mini-button" type="button" title="Rotate Z right">Z+</button>
          </div>
          <div class="view-controls" aria-label="Alignment controls">
            <span class="control-label">Align</span>
            <button id="alignLeft" class="mini-button" type="button" title="Align left" aria-label="Align left"><span class="align-icon align-left"></span></button>
            <button id="alignCenter" class="mini-button" type="button" title="Align center" aria-label="Align center"><span class="align-icon align-center"></span></button>
            <button id="alignRight" class="mini-button" type="button" title="Align right" aria-label="Align right"><span class="align-icon align-right"></span></button>
            <button id="alignTop" class="mini-button" type="button" title="Align top" aria-label="Align top"><span class="align-icon align-top"></span></button>
            <button id="alignMiddle" class="mini-button" type="button" title="Align middle" aria-label="Align middle"><span class="align-icon align-middle"></span></button>
            <button id="alignBottom" class="mini-button" type="button" title="Align bottom" aria-label="Align bottom"><span class="align-icon align-bottom"></span></button>
            <button id="distributeH" class="mini-button" type="button" title="Distribute horizontally" aria-label="Distribute horizontally"><span class="align-icon distribute-h"></span></button>
            <button id="distributeV" class="mini-button" type="button" title="Distribute vertically" aria-label="Distribute vertically"><span class="align-icon distribute-v"></span></button>
          </div>
        </div>
      </div>
      <div class="stage-wrap">
        <div class="stage">
          <div class="stage-actions" aria-label="Preview actions">
            <button id="snapshotView" class="stage-snapshot" type="button" title="Snapshot PDF" aria-label="Snapshot PDF">
              <svg class="tool-icon tool-icon-stroke" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 9.2h2.1l1.15-1.7h5.5l1.15 1.7H18a2.2 2.2 0 0 1 2.2 2.2v5.4A2.2 2.2 0 0 1 18 19H6a2.2 2.2 0 0 1-2.2-2.2v-5.4A2.2 2.2 0 0 1 6 9.2z"></path>
                <circle cx="12" cy="13.1" r="3.15"></circle>
                <path d="M8.1 9.2l.75-1.1"></path>
              </svg>
            </button>
          </div>
          <canvas id="canvas" width="1400" height="860"></canvas>
          <div class="status">
            <span id="scaleLabel"></span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
